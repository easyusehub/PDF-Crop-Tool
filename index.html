<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📄 PDF Crop Tool | EasyUseHub</title>
<style>
body, html{margin:0;padding:0;font-family:'Segoe UI',sans-serif;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;}
h1{text-align:center;margin:20px;}
#ad-top,#ad-middle{margin:15px 0;padding:12px;border:2px dashed #ccc;border-radius:10px;color:#999;width:90%;max-width:600px;text-align:center;}
#upload-box{border:3px dashed #9333ea;border-radius:12px;padding:20px;text-align:center;width:90%;max-width:400px;cursor:pointer;margin:15px;}
#upload-box:hover{background:#f5e6fa;}
#page-selector{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:15px;}
.thumbnail{border:1px solid #ccc;width:80px;height:100px;cursor:pointer;overflow:hidden;}
#crop-viewer{display:none;position:relative;width:100%;max-width:600px;height:80vh;border:1px solid #ccc;margin:15px auto;touch-action:none;overflow:hidden;}
#crop-viewer canvas{display:block;transform-origin:0 0;will-change:transform;}
.crop-rect{position:absolute;border:2px dashed #9333ea;background:rgba(147,51,234,0.2);}
button{padding:10px 20px;margin:10px;border:none;border-radius:8px;background:#9333ea;color:#fff;cursor:pointer;}
#top-buttons{display:flex;justify-content:center;gap:10px;}
</style>
</head>
<body>

<h1>📄 PDF Crop Tool</h1>
<div id="ad-top">Top Ad Placeholder</div>

<div id="top-buttons">
<button onclick="window.open('https://easyusehub.blogspot.com/p/free-pdf-tools-easyusehub.html?m=1','_blank')">📂 All PDF Tools</button>
<button onclick="window.open('https://easyusehub.blogspot.com/?m=1','_blank')">🏠 Home</button>
</div>

<div id="upload-box">📁 Upload PDF</div>
<input type="file" id="fileInput" accept="application/pdf" hidden>

<div id="page-selector"></div>

<div id="crop-viewer">
  <button id="back-btn">⬅ Back</button>
  <button id="download-btn">📥 Download Cropped PDF</button>
</div>

<div id="ad-middle">Middle Ad Placeholder</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
<script>
const uploadBox=document.getElementById('upload-box');
const fileInput=document.getElementById('fileInput');
const pageSelector=document.getElementById('page-selector');
const cropViewer=document.getElementById('crop-viewer');
const backBtn=document.getElementById('back-btn');
const downloadBtn=document.getElementById('download-btn');

let pdfDoc=null, pdfBytes=null, currentPage=0, canvas=null, cropRect=null, scale=1;

// Touch zoom variables
let startDist=0, lastScale=1;

uploadBox.onclick=()=>fileInput.click();

fileInput.addEventListener('change', async e=>{
  const file=e.target.files[0];
  if(!file) return;
  pdfBytes=await file.arrayBuffer();
  pdfDoc=await pdfjsLib.getDocument({data:pdfBytes}).promise;
  pageSelector.innerHTML='';
  for(let i=1;i<=pdfDoc.numPages;i++){
    const page = await pdfDoc.getPage(i);
    const viewport=page.getViewport({scale:0.2});
    const thumbCanvas=document.createElement('canvas');
    thumbCanvas.width=viewport.width;
    thumbCanvas.height=viewport.height;
    await page.render({canvasContext:thumbCanvas.getContext('2d'),viewport}).promise;
    const thumbDiv=document.createElement('div');
    thumbDiv.className='thumbnail';
    thumbDiv.appendChild(thumbCanvas);
    thumbDiv.onclick=()=>openCropPage(i);
    pageSelector.appendChild(thumbDiv);
  }
});

async function openCropPage(pageNum){
  pageSelector.style.display='none';
  cropViewer.style.display='block';
  currentPage=pageNum;
  const page = await pdfDoc.getPage(pageNum);
  const viewport=page.getViewport({scale:1});
  scale = Math.min(600/viewport.width,1);
  const scaledViewport=page.getViewport({scale:scale});

  canvas=document.createElement('canvas');
  canvas.width=scaledViewport.width;
  canvas.height=scaledViewport.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:scaledViewport}).promise;
  cropViewer.appendChild(canvas);

  // Crop rectangle
  if(cropRect) cropRect.remove();
  cropRect=document.createElement('div');
  cropRect.className='crop-rect';
  cropRect.style.left='50px';
  cropRect.style.top='50px';
  cropRect.style.width='200px';
  cropRect.style.height='200px';
  cropViewer.appendChild(cropRect);

  // Move & resize
  interact(cropRect).draggable({
    listeners:{move(event){
      const target=event.target;
      const x=(parseFloat(target.getAttribute('data-x'))||0)+event.dx;
      const y=(parseFloat(target.getAttribute('data-y'))||0)+event.dy;
      target.style.left=x+'px';
      target.style.top=y+'px';
      target.setAttribute('data-x',x);
      target.setAttribute('data-y',y);
    }}
  }).resizable({
    edges:{left:true,right:true,top:true,bottom:true},
    listeners:{move(event){
      let {width,height}=event.rect;
      event.target.style.width=width+'px';
      event.target.style.height=height+'px';
    }}
  });

  // Pinch-to-zoom
  cropViewer.addEventListener('touchmove', e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(startDist===0) startDist = dist;
      let pinchScale = dist/startDist;
      let newScale = lastScale * pinchScale;
      canvas.style.transform = `scale(${newScale})`;
      cropRect.style.transform = `scale(${newScale})`;
    }
  }, {passive:false});

  cropViewer.addEventListener('touchend', e=>{
    if(e.touches.length<2){
      lastScale = parseFloat(canvas.style.transform.replace('scale(','').replace(')','')||1);
      startDist = 0;
    }
  });
}

// Back button
backBtn.onclick=()=>{
  cropViewer.style.display='none';
  pageSelector.style.display='flex';
  cropViewer.innerHTML='';
  cropViewer.appendChild(backBtn);
  cropViewer.appendChild(downloadBtn);
}

// Download cropped PDF
downloadBtn.onclick=async()=>{
  const pdfLibDoc = await PDFLib.PDFDocument.load(pdfBytes);
  const page = pdfLibDoc.getPage(currentPage-1);
  const {x,y,width,height} = {
    x:parseFloat(cropRect.style.left)/scale,
    y:parseFloat(cropRect.style.top)/scale,
    width:parseFloat(cropRect.style.width)/scale,
    height:parseFloat(cropRect.style.height)/scale
  };
  page.setCropBox(x,page.getHeight() - y - height,width,height);
  const bytes = await pdfLibDoc.save();
  const blob = new Blob([bytes],{type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download='cropped-'+fileInput.files[0].name;
  a.click();
}
</script>
</body>
</html>
